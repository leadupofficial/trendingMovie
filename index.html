<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=800">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 480px; overflow: hidden;
    font-family: 'Arial Black', 'Helvetica', sans-serif;
    background: #000; color: #fff;
  }
  .header {
    display: flex; justify-content: space-between;
    align-items: center;
    padding: 8px 20px;
    background: #fff; color: #000;
  }
  .header h1 { font-size: 22px; letter-spacing: 2px; }
  .header .date { font-size: 12px; }
  .movies {
    display: flex;
    height: 440px;
  }
  .movie {
    width: 267px;
    padding: 12px 14px 8px;
    border-right: 2px solid #fff;
    display: flex;
    flex-direction: column;
  }
  .movie:last-child { border-right: none; }

  .top-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 2px;
  }
  .rank {
    font-size: 32px;
    font-weight: 900;
    line-height: 1;
  }
  .title {
    font-size: 15px;
    font-weight: 900;
    text-transform: uppercase;
    line-height: 1.15;
    flex: 1;
  }
  .rating-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid #fff;
  }
  .stars { letter-spacing: 1px; }
  .poster {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border: 2px solid #fff;
    filter: grayscale(1) contrast(1.8) brightness(1.2);
    margin-bottom: 8px;
  }
  .plot {
    font-size: 14px;
    line-height: 1.3;
    font-family: Arial, sans-serif;
    font-weight: normal;
    flex: 1;
    overflow: hidden;
  }
  .footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex; justify-content: space-between;
    padding: 4px 20px;
    font-size: 9px;
    background: #000;
    border-top: 1px solid #fff;
  }
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 480px; font-size: 22px;
  }
</style>
</head>
<body>
<div id="app">
  <div class="loading">LOADING TRENDING MOVIES...</div>
</div>
<script>
const TMDB_KEY = 'db243dbce2dc338ceca954f1f6bcb6d1';
const IMG_BASE = 'https://image.tmdb.org/t/p/w300';

async function loadMovies() {
  try {
    const res = await fetch(
      `https://api.themoviedb.org/3/trending/movie/day?api_key=${TMDB_KEY}`
    );
    const data = await res.json();
    const movies = data.results.filter(m => m.title && m.poster_path).slice(0, 3);
    renderMovies(movies);
  } catch (e) {
    document.getElementById('app').innerHTML =
      '<div class="loading">API ERROR — CHECK TMDB KEY</div>';
  }
}

function getStars(rating) {
  const count = Math.round(rating / 2);
  return '★'.repeat(count) + '☆'.repeat(5 - count);
}

function renderMovies(movies) {
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
  });

  let movieCards = movies.map((m, i) => {
    const year = m.release_date ? m.release_date.split('-')[0] : '';
    const plot = m.overview.length > 80
      ? m.overview.substring(0, 80) + '...'
      : m.overview;
    return `
      <div class="movie">
        <div class="top-row">
          <div class="rank">#${i + 1}</div>
          <div class="title">${m.title}</div>
        </div>
        <div class="rating-row">
          <span>${year}</span>
          <span class="stars">${getStars(m.vote_average)}</span>
          <span>${m.vote_average.toFixed(1)}</span>
        </div>
        <img class="poster" src="${IMG_BASE}${m.poster_path}" alt="${m.title}">
        <div class="plot">${plot}</div>
      </div>
    `;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <h1>▶ TRENDING MOVIES</h1>
      <div class="date">${dateStr}</div>
    </div>
    <div class="movies">${movieCards}</div>
    <div class="footer">
      <span>POWERED BY TMDB</span>
      <span>UPDATES EVERY 5 MIN</span>
    </div>
  `;
}

loadMovies();
</script>
</body>
</html>
