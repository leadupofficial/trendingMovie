<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=800">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 480px; overflow: hidden;
    font-family: 'Arial Black', 'Helvetica', sans-serif;
    background: #000; color: #fff;
  }
  .header {
    display: flex; justify-content: space-between;
    align-items: center;
    padding: 8px 20px;
    background: #fff; color: #000;
  }
  .header h1 { font-size: 20px; letter-spacing: 2px; }
  .header .badge {
    font-size: 11px;
    border: 2px solid #000;
    padding: 2px 10px;
    letter-spacing: 1px;
  }
  .content {
    display: flex;
    height: 440px;
  }
  .poster-side {
    width: 290px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-right: 3px solid #fff;
  }
  .poster {
    width: 260px;
    height: 380px;
    object-fit: cover;
    border: 3px solid #fff;
    filter: grayscale(1) contrast(1.8) brightness(1.2);
  }
  .poster-rank {
    font-size: 14px;
    letter-spacing: 3px;
    margin-top: 8px;
  }
  .info-side {
    flex: 1;
    padding: 18px 22px 14px;
    display: flex;
    flex-direction: column;
  }
  .number {
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 0;
  }
  .title {
    font-size: 28px;
    font-weight: 900;
    text-transform: uppercase;
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .meta {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid #fff;
    margin-bottom: 14px;
  }
  .stars {
    font-size: 20px;
    letter-spacing: 2px;
  }
  .plot {
    font-size: 16px;
    line-height: 1.45;
    font-family: Arial, sans-serif;
    font-weight: normal;
    flex: 1;
    overflow: hidden;
  }
  .footer-info {
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid #fff;
    font-size: 10px;
    display: flex;
    justify-content: space-between;
    letter-spacing: 1px;
  }
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 480px; font-size: 22px;
  }
</style>
</head>
<body>
<div id="app">
  <div class="loading">LOADING TRENDING MOVIE...</div>
</div>
<script>
const TMDB_KEY = 'db243dbce2dc338ceca954f1f6bcb6d1';
const IMG_BASE = 'https://image.tmdb.org/t/p/w500';

async function loadMovies() {
  try {
    const res = await fetch(
      `https://api.themoviedb.org/3/trending/movie/day?api_key=${TMDB_KEY}`
    );
    const data = await res.json();
    const movie = data.results.find(m => m.title && m.poster_path);
    if (movie) renderMovie(movie);
  } catch (e) {
    document.getElementById('app').innerHTML =
      '<div class="loading">API ERROR — CHECK TMDB KEY</div>';
  }
}

function getStars(rating) {
  const count = Math.round(rating / 2);
  return '★'.repeat(count) + '☆'.repeat(5 - count);
}

function renderMovie(m) {
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
  });
  const year = m.release_date ? m.release_date.split('-')[0] : '';
  const plot = m.overview.length > 220
    ? m.overview.substring(0, 220) + '...'
    : m.overview;

  document.getElementById('app').innerHTML = `
    <div class="header">
      <h1>▶ TRENDING TODAY</h1>
      <div class="badge">#1 WORLDWIDE</div>
    </div>
    <div class="content">
      <div class="poster-side">
        <img class="poster" src="${IMG_BASE}${m.poster_path}" alt="${m.title}">
        <div class="poster-rank">POWERED BY TMDB</div>
      </div>
      <div class="info-side">
        <div class="number">#1</div>
        <div class="title">${m.title}</div>
        <div class="meta">
          <span>${year}</span>
          <span class="stars">${getStars(m.vote_average)}</span>
          <span>${m.vote_average.toFixed(1)}</span>
        </div>
        <div class="plot">${plot}</div>
        <div class="footer-info">
          <span>${dateStr.toUpperCase()}</span>
          <span>UPDATES EVERY 5 MIN</span>
        </div>
      </div>
    </div>
  `;
}

loadMovies();
</script>
</body>
</html>
