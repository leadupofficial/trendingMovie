<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=800">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 480px; overflow: hidden;
    font-family: 'Arial Black', 'Helvetica', sans-serif;
    background: #000; color: #fff;
  }
  .header {
    padding: 10px 24px;
    background: #fff; color: #000;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header h1 { font-size: 26px; letter-spacing: 2px; }
  .header .sub { font-size: 11px; color: #000; }
  .header .date { font-size: 12px; color: #000; text-align: right; }
  .film-strip {
    display: flex; justify-content: center;
    gap: 5px; padding: 3px 0;
    background: #000;
  }
  .film-hole {
    width: 9px; height: 6px;
    border: 1px solid #fff;
    border-radius: 1px;
  }
  .movies { display: flex; gap: 0; height: 388px; }
  .movie {
    flex: 1; padding: 10px 12px;
    border-right: 2px solid #fff;
    display: flex; flex-direction: column;
  }
  .movie:last-child { border-right: none; }
  .poster-row { display: flex; gap: 10px; margin-bottom: 8px; }
  .poster {
    width: 80px; height: 120px;
    background: #000;
    border: 2px solid #fff;
    object-fit: cover;
    filter: grayscale(1) contrast(1.8) brightness(1.1);
  }
  .poster-info { flex: 1; }
  .rank {
    font-size: 36px; font-weight: 900;
    color: #fff; line-height: 1;
    margin-bottom: 2px;
  }
  .title {
    font-size: 14px; font-weight: 900;
    line-height: 1.2; margin-bottom: 4px;
    text-transform: uppercase;
    color: #fff;
  }
  .meta {
    font-size: 10px; color: #fff;
    margin-bottom: 4px;
  }
  .stars { letter-spacing: 1px; font-size: 12px; }
  .overview {
    font-size: 10px; color: #fff;
    line-height: 1.3;
    overflow: hidden;
    font-family: Arial, sans-serif;
    font-weight: normal;
    border-top: 1px solid #fff;
    padding-top: 6px;
  }
  .footer {
    display: flex; justify-content: space-between;
    padding: 4px 24px;
    font-size: 9px; color: #fff;
    background: #000;
    border-top: 1px solid #fff;
  }
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 480px; font-size: 24px; color: #fff;
  }
</style>
</head>
<body>
<div id="app">
  <div class="loading">LOADING TRENDING MOVIES...</div>
</div>
<script>
const TMDB_KEY = 'db243dbce2dc338ceca954f1f6bcb6d1';
const IMG_BASE = 'https://image.tmdb.org/t/p/w185';

async function loadMovies() {
  try {
    const res = await fetch(
      `https://api.themoviedb.org/3/trending/movie/day?api_key=${TMDB_KEY}`
    );
    const data = await res.json();
    const movies = data.results.filter(m => m.title && m.poster_path).slice(0, 3);
    renderMovies(movies);
  } catch (e) {
    document.getElementById('app').innerHTML =
      '<div class="loading">API ERROR — CHECK TMDB KEY</div>';
  }
}

function getStars(rating) {
  const count = Math.round(rating / 2);
  return '★'.repeat(count) + '☆'.repeat(5 - count);
}

function renderMovies(movies) {
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
  });

  let filmHoles = '';
  for (let i = 0; i < 65; i++) filmHoles += '<div class="film-hole"></div>';

  let movieCards = movies.map((m, i) => {
    const year = m.release_date ? m.release_date.split('-')[0] : '';
    const overview = m.overview.length > 100
      ? m.overview.substring(0, 100) + '...'
      : m.overview;
    return `
      <div class="movie">
        <div class="poster-row">
          <img class="poster" src="${IMG_BASE}${m.poster_path}" alt="${m.title}">
          <div class="poster-info">
            <div class="rank">#${i + 1}</div>
            <div class="title">${m.title}</div>
            <div class="meta">${year} · ${m.vote_average.toFixed(1)}</div>
            <div class="meta stars">${getStars(m.vote_average)}</div>
          </div>
        </div>
        <div class="overview">${overview}</div>
      </div>
    `;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div>
        <h1>▶ TRENDING MOVIES</h1>
        <div class="sub">POWERED BY TMDB · UPDATES EVERY 5 MIN</div>
      </div>
      <div class="date">${dateStr}</div>
    </div>
    <div class="film-strip">${filmHoles}</div>
    <div class="movies">${movieCards}</div>
    <div class="film-strip">${filmHoles}</div>
    <div class="footer">
      <span>DATA: THE MOVIE DATABASE (TMDB)</span>
      <span>▶ TRENDING TODAY · WORLDWIDE</span>
    </div>
  `;
}

loadMovies();
</script>
</body>
</html>
